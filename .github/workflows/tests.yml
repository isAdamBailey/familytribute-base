name: Tests

on:
  push:
    branches: [main, master, develop]
  pull_request:

concurrency:
  group: tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  phpunit:
    name: PHPUnit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, sqlite, pdo_sqlite, gd, bcmath, fileinfo
          coverage: none

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy environment
        run: |
          cp .env.example .env
          php artisan key:generate

      - name: Run PHPUnit
        run: |
          php artisan config:clear
          php artisan test

  e2e:
    name: Playwright e2e
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, sqlite, pdo_sqlite, gd, bcmath, fileinfo
          coverage: none

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install Composer dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Install npm dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Prepare e2e environment
        run: |
          cp .env.e2e.example .env.e2e
          KEY="$(php -r "echo 'base64:'.base64_encode(random_bytes(32));")"
          sed -i "s|^APP_KEY=.*|APP_KEY=${KEY}|" .env.e2e
          touch database/e2e.sqlite
          mkdir -p storage/app/public storage/framework/{cache,sessions,views} storage/logs bootstrap/cache
          npm run build

      - name: Run Playwright e2e
        run: npm run test:e2e
        env:
          CI: true
          FORCE_COLOR: '0'

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            playwright-report
            test-results
          retention-days: 7
